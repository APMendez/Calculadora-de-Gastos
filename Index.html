#calculadoradegastos 
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Divisor de Gastos 💸</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-100 via-blue-100 to-green-100 min-h-screen p-6 text-gray-800">

  <div class="max-w-4xl mx-auto bg-white shadow-xl rounded-2xl p-6">
    <h1 class="text-3xl font-bold mb-4 text-center">💸 Dividir Gastos</h1>

    <!-- Personas -->
    <div class="mb-6">
      <h2 class="text-xl font-semibold mb-2">👥 Participantes</h2>
      <div class="flex gap-2">
        <input id="nombre" type="text" placeholder="Nombre"
          class="border rounded-lg p-2 flex-1">
        <button onclick="agregarPersona()"
          class="bg-blue-300 hover:bg-blue-400 px-4 rounded-lg">Agregar</button>
      </div>
      <ul id="listaPersonas" class="mt-2"></ul>
    </div>

    <!-- Gastos -->
    <div class="mb-6">
      <h2 class="text-xl font-semibold mb-2">🧾 Gastos</h2>

      <div class="grid md:grid-cols-3 gap-2">
        <select id="personaGasto" class="border p-2 rounded-lg"></select>
        <input id="monto" type="number" placeholder="Monto"
          class="border p-2 rounded-lg">
        <input id="descripcion" type="text" placeholder="Descripción"
          class="border p-2 rounded-lg">
      </div>

      <button onclick="agregarGasto()"
        class="mt-2 bg-green-300 hover:bg-green-400 px-4 py-2 rounded-lg">
        Agregar gasto ➕
      </button>

      <ul id="listaGastos" class="mt-3"></ul>
    </div>

    <!-- Resultados -->
    <div>
      <button onclick="calcular()"
        class="bg-purple-300 hover:bg-purple-400 px-6 py-2 rounded-lg w-full text-lg">
        Calcular 💰
      </button>

      <div id="resultado" class="mt-4"></div>
    </div>

  </div>

<script>
let personas = [];
let gastos = [];

function agregarPersona() {
  const nombre = document.getElementById("nombre").value.trim();
  if (!nombre) return alert("Ingresá un nombre");
  if (personas.length >= 15) return alert("Máximo 15 personas");

  personas.push({ nombre, balance: 0 });
  document.getElementById("nombre").value = "";
  render();
}

function agregarGasto() {
  const idx = document.getElementById("personaGasto").value;
  const monto = parseFloat(document.getElementById("monto").value);
  const desc = document.getElementById("descripcion").value;

  if (idx === "" || !monto) return alert("Completar datos");

  gastos.push({
    persona: parseInt(idx),
    monto,
    desc
  });

  document.getElementById("monto").value = "";
  document.getElementById("descripcion").value = "";
  render();
}

function render() {
  // Personas
  const lista = document.getElementById("listaPersonas");
  lista.innerHTML = personas.map(p => `<li>• ${p.nombre}</li>`).join("");

  // Select
  const select = document.getElementById("personaGasto");
  select.innerHTML = personas.map((p, i) =>
    `<option value="${i}">${p.nombre}</option>`
  ).join("");

  // Gastos
  const listaGastos = document.getElementById("listaGastos");
  listaGastos.innerHTML = gastos.map(g =>
    `<li>💳 ${personas[g.persona].nombre} gastó $${g.monto} (${g.desc})</li>`
  ).join("");
}

function calcular() {
  if (personas.length === 0) return;

  // Reset balances
  personas.forEach(p => p.balance = 0);

  let total = 0;

  gastos.forEach(g => {
    personas[g.persona].balance += g.monto;
    total += g.monto;
  });

  const promedio = total / personas.length;

  // Ajustar balances
  personas.forEach(p => p.balance -= promedio);

  let deudores = personas.filter(p => p.balance < 0);
  let acreedores = personas.filter(p => p.balance > 0);

  let resultado = `<h3 class="text-lg font-bold">Total: $${total.toFixed(2)}</h3>`;
  resultado += `<p>Por persona: $${promedio.toFixed(2)}</p><ul class="mt-2">`;

  while (deudores.length && acreedores.length) {
    let d = deudores[0];
    let a = acreedores[0];

    let monto = Math.min(-d.balance, a.balance);

    resultado += `<li>💸 ${d.nombre} le debe $${monto.toFixed(2)} a ${a.nombre}</li>`;

    d.balance += monto;
    a.balance -= monto;

    if (Math.abs(d.balance) < 0.01) deudores.shift();
    if (Math.abs(a.balance) < 0.01) acreedores.shift();
  }

  resultado += "</ul>";

  document.getElementById("resultado").innerHTML = resultado;
}
</script>

</body>
</html>
