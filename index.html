<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dividir Gastos 💸</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-rose-100 via-sky-100 to-emerald-100 min-h-screen text-gray-800">

<div class="max-w-md mx-auto p-4">

<!-- TITULO EDITABLE -->
<input id="titulo"
class="w-full text-xl font-bold text-center mb-4 bg-white rounded-lg p-2 shadow"
placeholder="Nombre de la reunión (ej: Asado viernes 🔥)">

<!-- PERSONAS -->
<div class="bg-white rounded-xl shadow p-4 mb-4">
<h2 class="font-semibold mb-2">👥 Participantes</h2>

<div class="flex gap-2">
<input id="nombre" placeholder="Nombre" class="border p-2 rounded-lg flex-1">
<button onclick="agregarPersona()" class="bg-blue-300 px-3 rounded-lg">➕</button>
</div>

<ul id="listaPersonas" class="mt-2 text-sm"></ul>
</div>

<!-- GASTOS -->
<div class="bg-white rounded-xl shadow p-4 mb-4">
<h2 class="font-semibold mb-2">🧾 Gastos</h2>

<select id="personaGasto" class="border p-2 rounded-lg w-full mb-2"></select>

<input id="monto" type="number" placeholder="Monto"
class="border p-2 rounded-lg w-full mb-2">

<input id="descripcion" placeholder="Descripción"
class="border p-2 rounded-lg w-full mb-2">

<div class="flex gap-2 mb-2">
<button onclick="seleccionarTodos()" class="bg-gray-200 px-2 rounded">Todos</button>
<button onclick="seleccionarNinguno()" class="bg-gray-200 px-2 rounded">Ninguno</button>
</div>

<div id="checkboxPersonas" class="mb-2 text-sm"></div>

<button onclick="guardarGasto()"
class="bg-green-300 w-full py-2 rounded-lg mb-2">
Guardar gasto ➕
</button>

<ul id="listaGastos" class="text-sm"></ul>
</div>

<!-- RESULTADOS -->
<div class="bg-white rounded-xl shadow p-4">
<button onclick="calcular()"
class="bg-purple-300 w-full py-2 rounded-lg mb-2">
Calcular 💰
</button>

<textarea id="salidaTexto"
class="w-full h-40 border rounded-lg p-2 text-sm mb-2"
placeholder="Resumen para copiar..."></textarea>

<button onclick="copiarTexto()"
class="bg-emerald-300 w-full py-2 rounded-lg">
Copiar 📋
</button>

<div id="resultado" class="text-sm mt-3"></div>
</div>

</div>

<script>
let titulo = localStorage.getItem("titulo") || "";
let personas = JSON.parse(localStorage.getItem("personas")) || [];
let gastos = JSON.parse(localStorage.getItem("gastos")) || [];
let editando = null;

function guardarStorage() {
  localStorage.setItem("titulo", titulo);
  localStorage.setItem("personas", JSON.stringify(personas));
  localStorage.setItem("gastos", JSON.stringify(gastos));
}

// Titulo editable
document.getElementById("titulo").value = titulo;
document.getElementById("titulo").addEventListener("input", (e) => {
  titulo = e.target.value;
  guardarStorage();
});

function agregarPersona() {
  const nombre = document.getElementById("nombre").value.trim();
  if (!nombre) return;
  if (personas.length >= 15) return alert("Máximo 15");

  personas.push({ nombre, balance: 0 });
  document.getElementById("nombre").value = "";
  guardarStorage();
  render();
}

function guardarGasto() {
  const idx = document.getElementById("personaGasto").value;
  const monto = parseFloat(document.getElementById("monto").value);
  const desc = document.getElementById("descripcion").value;

  const participantes = Array.from(
    document.querySelectorAll(".checkPersona:checked")
  ).map(c => parseInt(c.value));

  if (!monto || participantes.length === 0) return alert("Datos incompletos");

  const gasto = { persona: parseInt(idx), monto, desc, participantes };

  if (editando !== null) {
    gastos[editando] = gasto;
    editando = null;
  } else {
    gastos.push(gasto);
  }

  limpiarFormulario();
  guardarStorage();
  render();
}

function editarGasto(i) {
  const g = gastos[i];
  editando = i;

  document.getElementById("personaGasto").value = g.persona;
  document.getElementById("monto").value = g.monto;
  document.getElementById("descripcion").value = g.desc;

  renderCheckboxes(g.participantes);
}

function eliminarGasto(i) {
  gastos.splice(i, 1);
  guardarStorage();
  render();
}

function limpiarFormulario() {
  document.getElementById("monto").value = "";
  document.getElementById("descripcion").value = "";
}

function seleccionarTodos() {
  document.querySelectorAll(".checkPersona").forEach(c => c.checked = true);
}

function seleccionarNinguno() {
  document.querySelectorAll(".checkPersona").forEach(c => c.checked = false);
}

function renderCheckboxes(seleccion = null) {
  document.getElementById("checkboxPersonas").innerHTML =
    personas.map((p, i) => `
      <label class="block">
        <input type="checkbox" class="checkPersona" value="${i}"
        ${!seleccion || seleccion.includes(i) ? "checked" : ""}>
        ${p.nombre}
      </label>
    `).join("");
}

function render() {
  document.getElementById("listaPersonas").innerHTML =
    personas.map(p => `<li>• ${p.nombre}</li>`).join("");

  document.getElementById("personaGasto").innerHTML =
    personas.map((p, i) => `<option value="${i}">${p.nombre}</option>`).join("");

  renderCheckboxes();

  document.getElementById("listaGastos").innerHTML =
    gastos.map((g, i) => `
      <li class="border-b py-1 flex justify-between">
        <span>💳 ${personas[g.persona].nombre}: $${g.monto} (${g.desc})</span>
        <div>
          <button onclick="editarGasto(${i})">✏️</button>
          <button onclick="eliminarGasto(${i})">❌</button>
        </div>
      </li>
    `).join("");
}

function calcular() {
  personas.forEach(p => p.balance = 0);

  gastos.forEach(g => {
    const parte = g.monto / g.participantes.length;

    g.participantes.forEach(i => {
      personas[i].balance -= parte;
    });

    personas[g.persona].balance += g.monto;
  });

  let deudores = personas.filter(p => p.balance < 0);
  let acreedores = personas.filter(p => p.balance > 0);

  let texto = `💸 ${titulo || "Resumen de gastos"}\n\n`;
  let html = `<p class="font-bold">${titulo || "Resumen de gastos"}</p><ul>`;

  while (deudores.length && acreedores.length) {
    let d = deudores[0];
    let a = acreedores[0];
    let monto = Math.min(-d.balance, a.balance);

    texto += `${d.nombre} paga $${monto.toFixed(2)} a ${a.nombre}\n`;
    html += `<li>${d.nombre} → $${monto.toFixed(2)} → ${a.nombre}</li>`;

    d.balance += monto;
    a.balance -= monto;

    if (Math.abs(d.balance) < 0.01) deudores.shift();
    if (Math.abs(a.balance) < 0.01) acreedores.shift();
  }

  html += "</ul>";

  document.getElementById("resultado").innerHTML = html;
  document.getElementById("salidaTexto").value = texto;
}

function copiarTexto() {
  const t = document.getElementById("salidaTexto");
  t.select();
  document.execCommand("copy");
  alert("Copiado");
}

render();
</script>

</body>
</html>
